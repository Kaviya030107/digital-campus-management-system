<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Management</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Attendance Management</h1>
  <p>Velammal Institute of Technology</p>
</header>

<div class="container">

  <div class="scan-section">
    <p>Scan your barcode ID to view attendance</p>
    <input type="text" id="scanInput" autofocus placeholder="Waiting for scan...">
    <button class="scan-btn" onclick="doScan()">Search</button>
  </div>

  <div class="student-card" id="studentCard">
    <h3 id="sName"></h3>
    <div class="student-meta">
      <p>ID: <span id="sId"></span></p>
      <p>Department: <span id="sDept"></span></p>
      <p>Year: <span id="sYear"></span></p>
    </div>

    <hr class="divider">

    <h4 class="section-heading">Attendance</h4>
    <div class="att-grid">
      <div class="att-box">
        <span class="att-label">Total Working Days</span>
        <span class="att-value" id="totalDays"></span>
      </div>
      <div class="att-box">
        <span class="att-label">Present Days</span>
        <span class="att-value present" id="presentDays"></span>
      </div>
      <div class="att-box">
        <span class="att-label">Absent Days</span>
        <span class="att-value absent" id="absentDays"></span>
      </div>
      <div class="att-box">
        <span class="att-label">Attendance %</span>
        <span class="att-value" id="attPercent"></span>
      </div>
    </div>
  </div>

  <p class="not-found" id="notFound">Student not found. Try scanning again.</p>
  <a class="back" href="index.html">&larr; Back to home</a>
</div>

<script src="students.js"></script>
<script src="attendance.js"></script>
<script>
  // Allow both Enter key and button click to trigger scan
  document.getElementById("scanInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") doScan();
  });

  function doScan() {
    const val = document.getElementById("scanInput").value;
    handleAttendanceScan(val);
    document.getElementById("scanInput").value = "";
  }
</script>

</body>
</html>
